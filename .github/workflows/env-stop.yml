# ─────────────────────────────────────────────────────────────────────────────
# env-stop.yml
#
# Stops the AKS cluster and PostgreSQL server to eliminate compute costs.
# Runs nightly on weekdays and on Saturday morning to cover the weekend.
# Can also be triggered immediately via workflow_dispatch.
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID         Service principal client ID (OIDC)
#   AZURE_TENANT_ID         Azure tenant ID (OIDC)
#   AZURE_SUBSCRIPTION_ID   Azure subscription ID (OIDC)
#   AZURE_RESOURCE_GROUP    Resource group name e.g. rg-axiom-dev
#   AKS_CLUSTER_NAME        AKS cluster name e.g. aks-axiom-dev
#   AZURE_DB_SERVER_NAME    *** NEW *** PostgreSQL flexible server name
#                           Find with:  cd terraform && terraform output -raw db_server_name
#                           Or: Azure Portal -> resource group -> PostgreSQL server name
#                           Example value: psql-axiom-dev-bpxn
#
# ─────────────────────────────────────────────────────────────────────────────

# ─── Schedule customisation ──────────────────────────────────────────────────
# Cron format: minute  hour  day-of-month  month  day-of-week
#              (0-59)  (0-23)    (1-31)   (1-12)   (0-6, Sun=0)
#
# All times are UTC. Adjust the hour values to match your local working hours:
#   GMT+0  UK standard:     no adjustment needed
#   GMT+1  UK summer (BST): subtract 1h  (e.g. 20 UTC = 21 BST stop)
#   GMT+2  Central Europe:  subtract 2h  (e.g. 18 UTC = 20 CET stop)
#   GMT-5  US Eastern:      add 5h       (e.g. 01 UTC = 20 EST stop)
#   GMT-8  US Pacific:      add 8h       (e.g. 04 UTC = 20 PST stop)
#   GMT+10 AEST:            subtract 10h (e.g. 10 UTC = 20 AEST stop)
#
# workflow_dispatch lets you stop the environment immediately regardless
# of the schedule — no need to wait for the next cron trigger.
# ─────────────────────────────────────────────────────────────────────────────

name: "Env — Stop (nightly)"

on:
  schedule:
    # Stop at 20:00 UTC Monday–Friday
    - cron: "0 20 * * 1-5"
    # Stop at 08:00 UTC Saturday — covers the weekend
    - cron: "0 8 * * 6"
  workflow_dispatch:
    inputs:
      confirm:
        description: "Confirm you want to stop the environment"
        type: choice
        options:
          - "yes"
          - "no"
        default: "yes"

# Prevent a start and stop from running at the same time.
# cancel-in-progress: false ensures the in-flight job completes first.
concurrency:
  group: environment-lifecycle
  cancel-in-progress: false

permissions:
  id-token: write   # required for OIDC login
  contents: read

jobs:

  # ─── check-state ────────────────────────────────────────────────────────────
  # Reads the current power state of both resources before trying to stop them.
  # The downstream stop jobs use these outputs to skip work that is unnecessary
  # (e.g. do not stop a resource that is already stopped).
  check-state:
    name: "Check current resource states"
    runs-on: ubuntu-latest
    outputs:
      aks_state: ${{ steps.aks_state.outputs.state }}
      db_state:  ${{ steps.db_state.outputs.state }}
    steps:
      - name: "Authenticate to Azure"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "Get AKS cluster power state"
        id: aks_state
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          RG="${{ secrets.AZURE_RESOURCE_GROUP }}"
          NAME="${{ secrets.AKS_CLUSTER_NAME }}"
          STATE=$(az rest \
            --method GET \
            --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.ContainerService/managedClusters/${NAME}?api-version=2023-10-01" \
            --query "properties.powerState.code" \
            --output tsv 2>/dev/null || echo "Unknown")
          echo "state=$STATE" >> "$GITHUB_OUTPUT"
          echo "AKS current state: $STATE"

      - name: "Get PostgreSQL server state"
        id: db_state
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          RG="${{ secrets.AZURE_RESOURCE_GROUP }}"
          NAME="${{ secrets.AZURE_DB_SERVER_NAME }}"
          STATE=$(az rest \
            --method GET \
            --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.DBforPostgreSQL/flexibleServers/${NAME}?api-version=2023-06-01-preview" \
            --query "properties.state" \
            --output tsv 2>/dev/null || echo "Unknown")
          echo "state=$STATE" >> "$GITHUB_OUTPUT"
          echo "PostgreSQL current state: $STATE"

  # ─── stop-aks ───────────────────────────────────────────────────────────────
  # Skipped automatically when check-state reports the cluster is already Stopped.
  stop-aks:
    name: "Stop AKS cluster"
    runs-on: ubuntu-latest
    needs: check-state
    if: needs.check-state.outputs.aks_state != 'Stopped' && needs.check-state.outputs.aks_state != 'Stopping' && needs.check-state.outputs.aks_state != 'Deallocated'
    steps:
      - name: "Authenticate to Azure"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "Stop AKS cluster"
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          RG="${{ secrets.AZURE_RESOURCE_GROUP }}"
          NAME="${{ secrets.AKS_CLUSTER_NAME }}"
          echo "Sending stop to AKS cluster $NAME"
          az rest \
            --method POST \
            --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.ContainerService/managedClusters/${NAME}/stop?api-version=2023-10-01" \
            --headers "Content-Type=application/json" \
            || echo "Stop request returned non-zero (may already be stopping/stopped)"
          echo "Polling for Stopped state..."
          for i in $(seq 1 24); do
            STATE=$(az rest \
              --method GET \
              --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.ContainerService/managedClusters/${NAME}?api-version=2023-10-01" \
              --query "properties.powerState.code" \
              --output tsv 2>/dev/null || echo "Unknown")
            echo "  [$i/24] AKS state: $STATE"
            [ "$STATE" = "Stopped" ] && { echo "AKS cluster stopped successfully"; exit 0; }
            sleep 30
          done
          echo "Warning: AKS did not reach Stopped state within 12 minutes"

      - name: "Verify AKS power state after stop"
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          RG="${{ secrets.AZURE_RESOURCE_GROUP }}"
          NAME="${{ secrets.AKS_CLUSTER_NAME }}"
          STATE=$(az rest \
            --method GET \
            --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.ContainerService/managedClusters/${NAME}?api-version=2023-10-01" \
            --query "properties.powerState.code" \
            --output tsv 2>/dev/null || echo "Unknown")
          echo "AKS final state: $STATE"

  # ─── stop-database ──────────────────────────────────────────────────────────
  # Runs in parallel with stop-aks — the two resources are independent.
  # Skipped automatically when the server is already Stopped.
  stop-database:
    name: "Stop PostgreSQL server"
    runs-on: ubuntu-latest
    needs: check-state
    if: needs.check-state.outputs.db_state != 'Stopped' && needs.check-state.outputs.db_state != 'Stopping'
    steps:
      - name: "Authenticate to Azure"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "Stop PostgreSQL flexible server"
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          RG="${{ secrets.AZURE_RESOURCE_GROUP }}"
          NAME="${{ secrets.AZURE_DB_SERVER_NAME }}"
          echo "Sending stop to PostgreSQL server $NAME"
          az rest \
            --method POST \
            --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.DBforPostgreSQL/flexibleServers/${NAME}/stop?api-version=2023-06-01-preview" \
            --headers "Content-Type=application/json" \
            || echo "Stop request returned non-zero (may already be stopping/stopped)"
          echo "Polling for Stopped state..."
          for i in $(seq 1 18); do
            STATE=$(az rest \
              --method GET \
              --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.DBforPostgreSQL/flexibleServers/${NAME}?api-version=2023-06-01-preview" \
              --query "properties.state" \
              --output tsv 2>/dev/null || echo "Unknown")
            echo "  [$i/18] PostgreSQL state: $STATE"
            [ "$STATE" = "Stopped" ] && { echo "PostgreSQL server stopped successfully"; exit 0; }
            sleep 20
          done
          echo "Warning: PostgreSQL did not reach Stopped state within 6 minutes"

      - name: "Verify PostgreSQL state after stop"
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          RG="${{ secrets.AZURE_RESOURCE_GROUP }}"
          NAME="${{ secrets.AZURE_DB_SERVER_NAME }}"
          STATE=$(az rest \
            --method GET \
            --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.DBforPostgreSQL/flexibleServers/${NAME}?api-version=2023-06-01-preview" \
            --query "properties.state" \
            --output tsv 2>/dev/null || echo "Unknown")
          echo "PostgreSQL final state: $STATE"

  # ─── summary ────────────────────────────────────────────────────────────────
  # Runs unconditionally (if: always()) so it prints a summary even when the
  # stop jobs were skipped because resources were already stopped.
  summary:
    name: "Print cost saving summary"
    runs-on: ubuntu-latest
    needs: [stop-aks, stop-database]
    if: always()
    steps:
      - name: "Print cost saving summary"
        run: |
          echo "================================================"
          echo "Dev environment stopped"
          echo "================================================"
          echo ""
          echo "Resources stopped:"
          echo "  AKS cluster:        ${{ secrets.AKS_CLUSTER_NAME }}"
          echo "  PostgreSQL server:  ${{ secrets.AZURE_DB_SERVER_NAME }}"
          echo ""
          echo "Approximate saving while stopped:"
          echo "  AKS nodes:    ~\$0.19/hour per D2s_v3 node"
          echo "  PostgreSQL:   ~\$0.021/hour for B1ms"
          echo ""
          echo "Note: AKS control plane (~\$0.10/hour) continues"
          echo "while the cluster exists. Use terraform destroy"
          echo "to eliminate all costs when not needed for weeks."
          echo ""
          echo "To start the environment:"
          echo "  GitHub Actions -> env-start -> Run workflow"
          echo "================================================"
