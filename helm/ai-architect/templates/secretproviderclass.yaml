{{- if .Values.keyvault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Release.Name }}-keyvault
  labels:
    {{- include "ai-architect.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: {{ .Values.keyvault.identityClientId | quote }}
    keyvaultName: {{ .Values.keyvault.vaultName | quote }}
    tenantId: {{ .Values.keyvault.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.keyvault.secrets }}
        - |
          objectName: {{ .name }}
          objectType: secret
        {{- end }}
  secretObjects:
    - secretName: archon-secrets
      type: Opaque
      data:
        {{- range .Values.keyvault.secrets }}
        - objectName: {{ .name }}
          key: {{ .key }}
        {{- end }}
{{- end }}
