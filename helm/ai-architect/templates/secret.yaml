{{- if .Values.bootstrapSecrets.create }}
# Bootstrap secret — used only during initial cluster bring-up before
# the Secrets Store CSI driver is available to sync from Key Vault.
# Disable (bootstrapSecrets.create=false) once CSI sync is stable.
apiVersion: v1
kind: Secret
metadata:
  name: archon-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-architect.labels" . | nindent 4 }}
  annotations:
    helm.sh/note: "Bootstrap secret — replace with CSI-synced secret once Key Vault is reachable."
type: Opaque
stringData:
  openai-api-key: {{ .Values.bootstrapSecrets.openaiApiKey | quote }}
  azure-openai-api-key: {{ .Values.bootstrapSecrets.azureOpenaiApiKey | quote }}
  azure-openai-endpoint: {{ .Values.bootstrapSecrets.azureOpenaiEndpoint | quote }}
  db-password: {{ .Values.bootstrapSecrets.dbPassword | quote }}
  jwt-secret: {{ .Values.bootstrapSecrets.jwtSecret | quote }}
  agent-internal-secret: {{ .Values.bootstrapSecrets.agentInternalSecret | quote }}
{{- end }}
