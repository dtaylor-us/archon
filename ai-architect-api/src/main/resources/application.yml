spring:
  application:
    name: ai-architect-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aiarchitect}
    username: ${DB_USER:aiarchitect}
    password: ${DB_PASSWORD:localdev}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    locations: classpath:db/migration

agent:
  base-url: ${AGENT_BASE_URL:http://localhost:8001}
  internal-secret: ${AGENT_INTERNAL_SECRET:dev-secret-change-in-prod}
  timeout-seconds: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: 1.0

server:
  port: 8080
  shutdown: graceful

security:
  jwt:
    secret: ${JWT_SECRET:super-secret-dev-key-change-in-prod-must-be-at-least-32-bytes}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
