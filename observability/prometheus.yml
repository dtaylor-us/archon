global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: local

scrape_configs:
  # Spring Boot API — /actuator/prometheus (Micrometer + OTel bridge)
  - job_name: archon-api
    static_configs:
      - targets: ["api:8080"]
    metrics_path: /actuator/prometheus

  # Python Agent — /metrics (OTel PrometheusMetricReader)
  - job_name: archon-agent
    static_configs:
      - targets: ["agent:8001"]
    metrics_path: /metrics

  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
